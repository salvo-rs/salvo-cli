name: ci

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'locales/**'
      - 'templates/**'
      - 'rustfmt.toml'
      - 'typos.toml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - 'locales/**'
      - 'templates/**'
      - 'rustfmt.toml'
      - 'typos.toml'
      - '.github/workflows/**'

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Typos check
        uses: crate-ci/typos@master

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check code format
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [typos, format, clippy]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Check the package for errors
        run: cargo check --all
      - name: Run tests
        run: cargo test --all-features -- --test-threads=1 --nocapture
